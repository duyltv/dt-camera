# docker/nginx/conf.d/dt-camera.conf
#
# Single-origin reverse proxy for DT Camera.
#
# Why this exists:
#   Before this proxy existed, the browser opened the frontend on
#   127.0.0.1:5173 (Vite dev) or :8088-ish, but the API client hard-coded
#   http://localhost:8080. Browsers treat 127.0.0.1 and localhost as
#   DIFFERENT origins, so every /api/* call failed CORS. Routing everything
#   through a single nginx origin (here: 127.0.0.1:8088) puts the SPA, the
#   API, and the HLS playlist on the same origin so cookies + relative
#   fetch URLs just work.
#
# Routes:
#   /api/*            -> backend:8080  (REST + WebSocket-friendly)
#   /hls/*            -> backend:8080  (live + recorded HLS playlists)
#   /healthz          -> backend:8080  (compose healthcheck)
#   /                 -> frontend:5173 (SPA)
#
# Tuned for HLS:
#   - proxy_buffering off on /hls so segments are flushed as they're produced
#   - 120s timeouts so long-lived HLS sessions don't get killed
#   - Range passthrough for video seeking
#   - WebSocket upgrade headers included even though HLS doesn't use WS today

upstream dt_backend {
    server backend:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream dt_frontend {
    server frontend:5173 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# Upstream connection timeouts: long enough for slow first DB queries.
proxy_connect_timeout 5s;
proxy_send_timeout 120s;
proxy_read_timeout 120s;

server {
    listen 8088 default_server;
    server_name _;

    # We do our own access/error logs to stdout so compose logs are readable.
    access_log /var/log/nginx/dt-access.log;
    error_log  /var/log/nginx/dt-error.log warn;

    # Allow large HLS segments and recording-range requests.
    client_max_body_size 64m;

    # /api/* -> backend. Pass through Range for any future binary endpoints.
    location /api/ {
        proxy_pass http://dt_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Cookies
        proxy_pass_header Set-Cookie;

        # For long-lived /api/live/* and /api/recordings/* streams.
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout    120s;
        proxy_read_timeout     120s;

        # Range support (useful for any future /api/recordings/.../file endpoint)
        proxy_force_ranges on;
    }

    # /hls/* -> backend. Live HLS playlists + .ts segments need streaming
    # passthrough and unbuffered delivery so the player can fetch new
    # segments as they're produced.
    location /hls/ {
        proxy_pass http://dt_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers are not required since /hls is same-origin now, but
        # we keep Range intact for video seeking.
        proxy_force_ranges on;
        proxy_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout    120s;
        proxy_read_timeout     120s;
    }

    # /healthz -> backend (also satisfies the compose healthcheck on this
    # container). Public; no auth.
    location = /healthz {
        proxy_pass http://dt_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_send_timeout    5s;
        proxy_read_timeout     5s;
    }

    # Everything else (the SPA) -> frontend Vite dev server. Vite serves
    # index.html for unknown paths; the X-Forwarded-* headers let Vite
    # understand the public origin.
    location / {
        proxy_pass http://dt_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite uses WebSockets for HMR; preserve them even in dev.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout     60s;
    }
}

# Map WebSocket upgrade headers globally.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}